{% extends 'base.html' %}
{% load static %}

{% block title %}用户登录 - 小说阅读系统{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="flex justify-center">
        <div class="w-full max-w-md">
            <div class="card">
                <div class="card-header text-center">
                    <h4 class="flex items-center justify-center text-xl font-bold text-gray-900">
                        <i class="fas fa-sign-in-alt text-blue-600 mr-3"></i> 用户登录
                    </h4>
                    <p class="text-gray-600 mt-2">欢迎来到小说阅读系统</p>
                </div>
                <div class="card-body">
                    <form method="post" id="loginForm">
                        {% csrf_token %}
                        <div class="mb-6">
                            <label class="block text-sm font-medium text-gray-700 mb-2">登录类型</label>
                            <div class="flex space-x-4">
                                <label class="flex items-center">
                                    <input type="radio" 
                                           name="user_type" 
                                           value="user" 
                                           class="form-radio text-blue-600" 
                                           checked>
                                    <span class="ml-2 text-sm text-gray-700">普通用户</span>
                                </label>
                                <label class="flex items-center">
                                    <input type="radio" 
                                           name="user_type" 
                                           value="admin" 
                                           class="form-radio text-blue-600">
                                    <span class="ml-2 text-sm text-gray-700">管理员</span>
                                </label>
                            </div>
                        </div>
                        
                        <div class="mb-6">
                            <label for="username" class="block text-sm font-medium text-gray-700 mb-2">用户名</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <i class="fas fa-user text-gray-400"></i>
                                </div>
                                <input type="text" 
                                       class="form-input pl-10" 
                                       id="username" 
                                       name="username" 
                                       placeholder="请输入用户名" 
                                       required>
                            </div>
                        </div>
                        
                        <div class="mb-6">
                            <label for="password" class="block text-sm font-medium text-gray-700 mb-2">密码</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <i class="fas fa-lock text-gray-400"></i>
                                </div>
                                <input type="password" 
                                       class="form-input pl-10 pr-10" 
                                       id="password" 
                                       name="password" 
                                       placeholder="请输入密码" 
                                       required>
                                <button type="button" 
                                        class="absolute inset-y-0 right-0 pr-3 flex items-center"
                                        onclick="togglePassword()">
                                    <i class="fas fa-eye text-gray-400 hover:text-gray-600" id="passwordToggle"></i>
                                </button>
                            </div>
                        </div>
                        
                        <div class="mb-6">
                            <div class="flex items-center">
                                <input type="checkbox" 
                                       class="form-checkbox h-4 w-4 text-blue-600 transition duration-150 ease-in-out" 
                                       id="rememberMe">
                                <label class="ml-2 block text-sm text-gray-700" for="rememberMe">
                                    记住我
                                </label>
                            </div>
                        </div>
                        
                        <div class="mb-6">
                            <button type="submit" class="btn btn-primary w-full">
                                <i class="fas fa-sign-in-alt mr-2"></i> 登录
                            </button>
                        </div>
                    </form>
                    
                    <div class="border-t border-gray-200 pt-6">
                        <div class="text-center">
                            <p class="text-sm text-gray-600 mb-3">还没有账号？</p>
                            <a href="{% url 'register' %}" class="btn btn-outline-primary">
                                <i class="fas fa-user-plus mr-2"></i> 立即注册
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_css %}
<style>
/* 登录页面专用样式 */
.form-input {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 1px solid #d1d5db;
    border-radius: 0.5rem;
    font-size: 1rem;
    line-height: 1.5;
    color: #374151;
    background-color: #ffffff;
    transition: all 0.2s ease-in-out;
}

.form-input:focus {
    outline: none;
    border-color: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
}

.form-input::placeholder {
    color: #9ca3af;
}

.form-checkbox {
    border: 1px solid #d1d5db;
    border-radius: 0.25rem;
}

.form-checkbox:checked {
    background-color: #3b82f6;
    border-color: #3b82f6;
}

.form-checkbox:focus {
    outline: none;
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
}

.form-radio {
    border: 1px solid #d1d5db;
    border-radius: 50%;
}

.form-radio:checked {
    background-color: #3b82f6;
    border-color: #3b82f6;
}

.form-radio:focus {
    outline: none;
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
}

/* 按钮样式 */
.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0.75rem 1.5rem;
    font-size: 1rem;
    font-weight: 500;
    line-height: 1.5;
    border-radius: 0.5rem;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.2s ease-in-out;
    text-decoration: none;
}

.btn-primary {
    background-color: #3b82f6;
    color: #ffffff;
    border-color: #3b82f6;
}

.btn-primary:hover {
    background-color: #2563eb;
    border-color: #2563eb;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
}

.btn-outline-primary {
    background-color: transparent;
    color: #3b82f6;
    border-color: #3b82f6;
}

.btn-outline-primary:hover {
    background-color: #3b82f6;
    color: #ffffff;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
}

.w-full {
    width: 100%;
}

/* 响应式设计 */
@media (max-width: 640px) {
    .max-w-md {
        max-width: 100%;
    }
}
</style>
{% endblock %}

{% block extra_js %}
<script>
function togglePassword() {
    const passwordInput = document.getElementById('password');
    const passwordToggle = document.getElementById('passwordToggle');
    
    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        passwordToggle.className = 'fas fa-eye-slash text-gray-400 hover:text-gray-600';
    } else {
        passwordInput.type = 'password';
        passwordToggle.className = 'fas fa-eye text-gray-400 hover:text-gray-600';
    }
}

// 表单验证
document.getElementById('loginForm').addEventListener('submit', function(e) {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    
    if (!username) {
        e.preventDefault();
        showMessage('请输入用户名', 'error');
        return;
    }
    
    if (!password) {
        e.preventDefault();
        showMessage('请输入密码', 'error');
        return;
    }
    
    if (password.length < 6) {
        e.preventDefault();
        showMessage('密码长度不能少于6位', 'error');
        return;
    }
});

function showMessage(message, type) {
    const alertClass = type === 'success' ? 'bg-green-100 border-green-400 text-green-700' : 'bg-red-100 border-red-400 text-red-700';
    const alertHtml = `
        <div class="fixed top-4 right-4 z-50 max-w-sm w-full bg-white shadow-lg rounded-lg pointer-events-auto ring-1 ring-black ring-opacity-5 overflow-hidden">
            <div class="p-4">
                <div class="flex items-start">
                    <div class="flex-shrink-0">
                        <i class="fas ${type === 'success' ? 'fa-check-circle text-green-400' : 'fa-exclamation-circle text-red-400'}"></i>
                    </div>
                    <div class="ml-3 w-0 flex-1 pt-0.5">
                        <p class="text-sm font-medium text-gray-900">${message}</p>
                    </div>
                    <div class="ml-4 flex-shrink-0 flex">
                        <button class="bg-white rounded-md inline-flex text-gray-400 hover:text-gray-500 focus:outline-none" onclick="this.parentElement.parentElement.parentElement.parentElement.remove()">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    `;
    
    document.body.insertAdjacentHTML('beforeend', alertHtml);
    
    // 3秒后自动消失
    setTimeout(() => {
        const alert = document.querySelector('.fixed.top-4.right-4');
        if (alert) {
            alert.remove();
        }
    }, 3000);
}
</script>
{% endblock %}
