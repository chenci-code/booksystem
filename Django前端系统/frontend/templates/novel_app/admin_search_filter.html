<!-- 搜索和筛选区域 - 统一组件 -->
<div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 mb-6">
    <form method="GET" class="flex flex-wrap gap-4 items-end">
        <!-- 主搜索框 -->
        <div class="flex-1 min-w-64">
            <label for="search" class="block text-sm font-medium text-gray-700 mb-2">{{ search_label|default:"搜索" }}</label>
            <input type="text" id="search" name="search" value="{{ search_query }}" placeholder="{{ search_placeholder|default:'输入关键词...' }}"
                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>

        <!-- 动态筛选字段 -->
        {% for filter in filters %}
        <div class="min-w-32">
            <label for="{{ filter.name }}" class="block text-sm font-medium text-gray-700 mb-2">{{ filter.label }}</label>
            <select id="{{ filter.name }}" name="{{ filter.name }}"
                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">{{ filter.all_option|default:"全部" }}</option>
                {% for choice in filter.choices %}
                    <option value="{{ choice.0 }}" {% if choice.0 == filter.selected %}selected{% endif %}>{{ choice.1 }}</option>
                {% endfor %}
            </select>
        </div>
        {% endfor %}

        <!-- 日期筛选（如果需要） -->
        {% if date_filters %}
        <div class="min-w-32">
            <label for="date_from" class="block text-sm font-medium text-gray-700 mb-2">开始日期</label>
            <input type="date" id="date_from" name="date_from" value="{{ date_from }}"
                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div class="min-w-32">
            <label for="date_to" class="block text-sm font-medium text-gray-700 mb-2">结束日期</label>
            <input type="date" id="date_to" name="date_to" value="{{ date_to }}"
                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        {% endif %}

        <!-- 操作按钮 -->
        <div class="flex gap-2">
            <button type="submit"
                class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <i class="fas fa-search mr-2"></i>搜索
            </button>
            <a href="{{ clear_url }}"
                class="px-4 py-2 bg-gray-500 text-white rounded-md hover:bg-gray-600 focus:outline-none focus:ring-2 focus:ring-gray-500">
                <i class="fas fa-times mr-2"></i>清除
            </a>
        </div>
    </form>
</div>
